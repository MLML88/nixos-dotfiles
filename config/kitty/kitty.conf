# include colors/custom/gruvbox-dark.conf
include colors/custom/tokyo-night.conf

font_family RobotoMono Nerd Font
font_size 13

disable_ligatures no
enable_audio_bell no

shell fish
shell_integration disabled

cursor_shape block

url_style curly

remember_window_size no
# initial_window_width 640
# initial_window_height 480
initial_window_width 78c
initial_window_height 23c
window_padding_width 15
cursor_blink_interval 0

background_opacity 0.80
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
confirm_os_window_close 0

sync_to_monitor no

repaint_delay 8
input_delay 3

cursor_trail 3

