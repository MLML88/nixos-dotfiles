# BACKGROUND
background {
    monitor =
    path = ~/Pictures/wallhaven-gw91rd.jpg
    # blur_passes = 1
    # blur_size = 3
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# CLOCK
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    font_size = 80
    font_family = JetBrains Mono
    position = 0, 100
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(ffffffaa)
    inner_color = rgba(000000aa)
    font_color = rgba(ffffffff)

    placeholder_text = <i>Enter Password...</i>
    hide_input = false

    position = 0, -80
    halign = center
    valign = center
}

